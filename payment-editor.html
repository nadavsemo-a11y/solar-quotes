<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>עריכת תנאי תשלום — SEMO AGS</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Assistant', sans-serif; background: #f1f5f9; color: #1a1a2e; padding: 20px; min-height: 100vh; direction: rtl; }
h1 { text-align: center; color: #0A1628; margin-bottom: 6px; font-size: 24px; }
.subtitle { text-align: center; color: #6B7280; font-size: 14px; margin-bottom: 28px; }
.container { max-width: 700px; margin: 0 auto; }

.stage-card {
  background: white; border-radius: 14px; padding: 20px 24px; margin-bottom: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06); border-right: 5px solid #F4A200;
  transition: box-shadow 0.2s;
}
.stage-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.stage-num { background: #0A1628; color: #F4A200; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 15px; flex-shrink: 0; }
.stage-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.stage-header-title { font-size: 16px; font-weight: 800; color: #0A1628; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 12px; }
.form-row.three { grid-template-columns: 1fr 1fr 1fr; }
.field label { display: block; font-size: 12px; font-weight: 700; color: #6B7280; margin-bottom: 4px; }
.field input, .field select {
  width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px;
  font-size: 14px; font-family: inherit; background: #f8fafc; color: #0A1628;
  transition: border-color 0.2s;
}
.field input:focus, .field select:focus { outline: none; border-color: #F4A200; background: white; }
.field .hint { font-size: 11px; color: #9CA3AF; margin-top: 3px; }

.preview-box {
  background: #0A1628; color: white; border-radius: 14px; padding: 20px 24px;
  margin-top: 24px; margin-bottom: 20px;
}
.preview-box h3 { font-size: 15px; font-weight: 800; color: #F4A200; margin-bottom: 14px; }
.preview-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.preview-table th { text-align: right; padding: 8px 10px; color: #F4A200; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.15); }
.preview-table td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.preview-table td.num { text-align: left; font-weight: 700; direction: ltr; }
.preview-table .total td { border-top: 2px solid #F4A200; font-weight: 800; font-size: 14px; }
.preview-input { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.preview-input label { font-size: 13px; color: #94a3b8; white-space: nowrap; }
.preview-input input { width: 130px; padding: 7px 10px; border: 1.5px solid rgba(255,255,255,0.2); border-radius: 8px; font-size: 15px; font-weight: 800; background: rgba(255,255,255,0.1); color: white; text-align: center; direction: ltr; font-family: inherit; }
.preview-input input:focus { outline: none; border-color: #F4A200; }

.actions {
  position: sticky; bottom: 0; background: white; border-radius: 14px;
  padding: 16px 24px; box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
  display: flex; gap: 12px; justify-content: center; align-items: center;
}
.btn { padding: 12px 28px; border: none; border-radius: 10px; font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.btn-save { background: #F4A200; color: white; }
.btn-save:hover { background: #e09500; }
.btn-reset { background: #e2e8f0; color: #0A1628; }
.btn-reset:hover { background: #cbd5e1; }
.status { font-size: 13px; color: #22c55e; font-weight: 700; display: none; }
</style>
</head>
<body>

<div class="container">
  <h1>עריכת תנאי תשלום</h1>
  <div class="subtitle">הגדר את שלבי התשלום — שמות, תיאורים, אחוזים וסכום מקדמה. השינויים נשמרים ומשפיעים על הצעת המחיר.</div>

  <div id="stagesContainer"></div>

  <div class="preview-box">
    <h3>תצוגה מקדימה</h3>
    <div class="preview-input">
      <label>מחיר מערכת לדוגמה (₪):</label>
      <input type="number" id="previewPrice" value="80000" oninput="renderPreview()">
    </div>
    <table class="preview-table">
      <thead><tr><th>שלב</th><th>תיאור</th><th>סכום</th></tr></thead>
      <tbody id="previewBody"></tbody>
    </table>
  </div>

  <div class="actions">
    <button class="btn btn-save" onclick="saveConfig()">שמור שינויים</button>
    <button class="btn btn-reset" onclick="resetConfig()">איפוס לברירת מחדל</button>
    <span class="status" id="statusMsg">נשמר!</span>
  </div>
</div>

<script>
const STORAGE_KEY = 'semo-payment-stages';

const DEFAULTS = [
  { label: 'מקדמה',           desc: 'בחתימת ההסכם',                         type: 'fixed', value: 6000 },
  { label: 'השלמה ל-35%',     desc: 'בקבלת תוכניות ביצוע',                  type: 'percent', value: 35 },
  { label: 'השלמה ל-95%',     desc: '7 ימי עסקים בטרם אספקת פאנלים לאתר',   type: 'percent', value: 95 },
  { label: '5% אחרון',        desc: 'ביום החיבור לחברת החשמל',               type: 'remainder', value: 100 },
];

function loadConfig() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULTS));
}

function renderStages() {
  const stages = loadConfig();
  const container = document.getElementById('stagesContainer');
  container.innerHTML = '';

  stages.forEach((stage, i) => {
    const card = document.createElement('div');
    card.className = 'stage-card';
    card.innerHTML = `
      <div class="stage-header">
        <div class="stage-num">${i + 1}</div>
        <div class="stage-header-title">שלב ${i + 1}</div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>שם השלב</label>
          <input type="text" data-idx="${i}" data-field="label" value="${esc(stage.label)}" oninput="onFieldChange()">
        </div>
        <div class="field">
          <label>תיאור</label>
          <input type="text" data-idx="${i}" data-field="desc" value="${esc(stage.desc)}" oninput="onFieldChange()">
        </div>
      </div>
      <div class="form-row three">
        <div class="field">
          <label>סוג חישוב</label>
          <select data-idx="${i}" data-field="type" onchange="onFieldChange()">
            <option value="fixed" ${stage.type === 'fixed' ? 'selected' : ''}>סכום קבוע (₪)</option>
            <option value="percent" ${stage.type === 'percent' ? 'selected' : ''}>אחוז מצטבר (%)</option>
            <option value="remainder" ${stage.type === 'remainder' ? 'selected' : ''}>יתרה (עד 100%)</option>
          </select>
          <div class="hint">${stage.type === 'fixed' ? 'סכום קבוע בשקלים' : stage.type === 'percent' ? 'אחוז מצטבר מהמחיר' : 'היתרה עד סוף המחיר'}</div>
        </div>
        <div class="field">
          <label>${stage.type === 'fixed' ? 'סכום (₪)' : 'אחוז (%)'}</label>
          <input type="number" data-idx="${i}" data-field="value" value="${stage.value}" ${stage.type === 'remainder' ? 'disabled' : ''} oninput="onFieldChange()" step="${stage.type === 'fixed' ? '500' : '5'}" min="0">
        </div>
        <div class="field" style="display:flex;align-items:flex-end">
          ${stages.length > 2 ? `<button onclick="removeStage(${i})" style="padding:9px 14px;background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;width:100%">מחק שלב</button>` : ''}
        </div>
      </div>
    `;
    container.appendChild(card);
  });

  // Add stage button
  const addBtn = document.createElement('div');
  addBtn.style.cssText = 'text-align:center;margin:16px 0';
  addBtn.innerHTML = `<button onclick="addStage()" style="padding:10px 24px;background:#10b981;color:white;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit">+ הוסף שלב תשלום</button>`;
  container.appendChild(addBtn);

  renderPreview();
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function readForm() {
  const stages = [];
  const cards = document.querySelectorAll('.stage-card');
  cards.forEach((card, i) => {
    const get = (field) => card.querySelector(`[data-field="${field}"]`)?.value || '';
    stages.push({
      label: get('label'),
      desc: get('desc'),
      type: get('type'),
      value: parseFloat(get('value')) || 0,
    });
  });
  return stages;
}

function onFieldChange() {
  renderPreview();
}

function renderPreview() {
  const stages = readForm();
  const price = parseInt(document.getElementById('previewPrice').value) || 80000;
  const fmt = n => Math.round(n).toLocaleString('he-IL');

  const body = document.getElementById('previewBody');
  let html = '';
  let cumulative = 0;

  stages.forEach((s, i) => {
    let amount = 0;
    if (s.type === 'fixed') {
      amount = s.value;
    } else if (s.type === 'percent') {
      amount = Math.round(price * s.value / 100) - cumulative;
    } else {
      // remainder
      amount = price - cumulative;
    }
    cumulative += amount;
    html += `<tr><td>${esc(s.label)}</td><td>${esc(s.desc)}</td><td class="num">₪${fmt(amount)}</td></tr>`;
  });

  html += `<tr class="total"><td colspan="2">סה"כ</td><td class="num">₪${fmt(cumulative)}</td></tr>`;

  if (cumulative !== price) {
    html += `<tr><td colspan="3" style="color:#f87171;font-size:12px;padding-top:8px">שימו לב: סה"כ (₪${fmt(cumulative)}) שונה ממחיר המערכת (₪${fmt(price)})</td></tr>`;
  }

  body.innerHTML = html;
}

function saveConfig() {
  const stages = readForm();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(stages));

  // Also sync to ContentManager payment-desc section
  syncToContentManager(stages);

  const msg = document.getElementById('statusMsg');
  msg.style.display = 'inline';
  setTimeout(() => msg.style.display = 'none', 2500);
}

function syncToContentManager(stages) {
  // Update ContentManager's payment-desc blocks to match
  try {
    const cmKey = 'semo-content-blocks';
    let cm = JSON.parse(localStorage.getItem(cmKey) || 'null');
    if (cm && cm.sections && cm.sections['payment-desc']) {
      cm.sections['payment-desc'].blocks = stages.map((s, i) => ({
        id: 'pay-' + (i + 1),
        title: s.label,
        text: s.desc,
        enabled: true,
      }));
      localStorage.setItem(cmKey, JSON.stringify(cm));
    }
  } catch(e) {}
}

function resetConfig() {
  if (!confirm('לאפס את תנאי התשלום לברירת מחדל?')) return;
  localStorage.removeItem(STORAGE_KEY);
  renderStages();
}

function addStage() {
  const stages = readForm();
  // Insert before last (remainder) stage
  const lastIdx = stages.length - 1;
  const lastStage = stages[lastIdx];
  const prevPct = lastIdx > 0 && stages[lastIdx - 1].type === 'percent' ? stages[lastIdx - 1].value : 95;
  stages.splice(lastIdx, 0, {
    label: 'שלב נוסף',
    desc: 'תיאור השלב',
    type: 'percent',
    value: Math.min(prevPct + 2, 99),
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(stages));
  renderStages();
}

function removeStage(idx) {
  if (!confirm('למחוק שלב זה?')) return;
  const stages = readForm();
  stages.splice(idx, 1);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(stages));
  renderStages();
}

renderStages();
</script>
</body>
</html>
