<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מפרט טכני — SEMO AGS</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #0A1628;
    --sky-mid: #112240;
    --sun: #F4A200;
    --sun-light: #FFD166;
    --green: #2ECC71;
    --text: #1a1a2e;
    --gray: #6B7280;
    --light: #F7F9FC;
    --white: #fff;
    --border: #E2E8F0;
    --danger: #e74c3c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Assistant', sans-serif; background: var(--light); color: var(--text); min-height: 100vh; }

  .page {
    max-width: 800px;
    margin: 0 auto;
    background: var(--white);
    min-height: 100vh;
    box-shadow: 0 0 40px rgba(0,0,0,0.08);
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--sky), var(--sky-mid));
    padding: 32px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .header img.header-logo { height: 40px; }
  .header-badge { color: rgba(255,255,255,0.5); font-size: 13px; }

  /* Project Title */
  .title-section {
    padding: 40px 40px 24px;
    border-bottom: 3px solid var(--sun);
  }
  .project-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--sun);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .project-name {
    font-size: 36px;
    font-weight: 800;
    color: var(--sky);
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .project-address {
    font-size: 16px;
    color: var(--gray);
  }

  /* Specs Grid */
  .specs-section {
    padding: 32px 40px;
  }
  .specs-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--sky);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .specs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }
  .spec-card {
    background: var(--light);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }
  .spec-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--gray);
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }
  .spec-value {
    font-size: 20px;
    font-weight: 800;
    color: var(--sky);
  }
  .spec-value small {
    font-size: 14px;
    font-weight: 600;
    color: var(--gray);
  }
  .spec-card.full {
    grid-column: 1 / -1;
  }
  .spec-card.highlight {
    border-color: var(--sun);
    background: linear-gradient(135deg, rgba(244,162,0,0.05), rgba(255,209,102,0.08));
  }

  /* Design Image */
  .image-section {
    padding: 0 40px 32px;
  }
  .image-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--sky);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .design-image {
    width: 100%;
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .no-image {
    background: var(--light);
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    color: var(--gray);
    font-size: 14px;
  }

  /* Signature Section */
  .signature-section {
    padding: 32px 40px 40px;
    border-top: 2px solid var(--border);
    margin-top: 16px;
  }
  .sig-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--sky);
    margin-bottom: 6px;
  }
  .sig-sub {
    font-size: 14px;
    color: var(--gray);
    margin-bottom: 24px;
  }
  .sig-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  .sig-field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--gray);
    margin-bottom: 6px;
  }
  .sig-field input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'Assistant', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .sig-field input:focus { border-color: var(--sun); }
  .sig-field input.error { border-color: var(--danger); }

  .sig-canvas-wrap {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    position: relative;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gray);
    font-size: 14px;
    margin-bottom: 8px;
    background: var(--light);
    cursor: crosshair;
    overflow: hidden;
  }
  .sig-canvas-wrap.error { border-color: var(--danger); }
  .sig-canvas-wrap canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  .sig-placeholder {
    pointer-events: none;
    z-index: 1;
  }
  .sig-actions {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }
  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 16px;
    font-family: 'Assistant', sans-serif;
    font-size: 13px;
    color: var(--gray);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-clear:hover { border-color: var(--danger); color: var(--danger); }

  .sig-agree {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 20px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
  }
  .sig-agree input[type="checkbox"] {
    margin-top: 3px;
    width: 18px;
    height: 18px;
    accent-color: var(--green);
  }

  /* Terms Block */
  .terms-block {
    background: var(--light);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
    font-size: 13.5px;
    line-height: 1.9;
    color: var(--text);
  }
  .terms-block p {
    margin-bottom: 12px;
  }
  .terms-block p:last-child {
    margin-bottom: 0;
  }

  .sig-btn {
    background: linear-gradient(135deg, var(--green), #27ae60);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px 32px;
    font-family: 'Assistant', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s;
  }
  .sig-btn:hover { opacity: 0.9; }
  .sig-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .sig-error {
    color: var(--danger);
    font-size: 13px;
    margin-top: 10px;
    text-align: center;
    display: none;
  }

  /* Signed State */
  .signed-banner {
    background: linear-gradient(135deg, rgba(46,204,113,0.08), rgba(39,174,96,0.12));
    border: 1px solid rgba(46,204,113,0.3);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
  }
  .signed-banner .signed-icon { font-size: 48px; margin-bottom: 12px; }
  .signed-banner .signed-title { font-size: 20px; font-weight: 700; color: var(--green); margin-bottom: 8px; }
  .signed-banner .signed-info { font-size: 14px; color: var(--gray); line-height: 1.8; }
  .signed-banner .signed-sig-img { max-width: 200px; margin-top: 12px; opacity: 0.7; }

  /* Progress */
  .progress-bar {
    display: none;
    margin-top: 16px;
  }
  .progress-bar.show { display: block; }
  .progress-text {
    font-size: 13px;
    color: var(--gray);
    text-align: center;
    margin-bottom: 8px;
  }
  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 4px;
    transition: width 0.4s;
    width: 0;
  }

  /* Footer */
  .footer {
    background: var(--sky);
    padding: 20px 40px;
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-size: 12px;
  }

  @media (max-width: 600px) {
    .header { padding: 24px 20px; }
    .title-section { padding: 28px 20px 20px; }
    .project-name { font-size: 28px; }
    .specs-section { padding: 24px 20px; }
    .specs-grid { grid-template-columns: 1fr; }
    .image-section { padding: 0 20px 24px; }
    .signature-section { padding: 24px 20px 32px; }
    .sig-grid { grid-template-columns: 1fr; }
    .footer { padding: 16px 20px; }
  }

  @media print {
    .page { box-shadow: none; }
    .signature-section { page-break-inside: avoid; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="header-right">
      <img class="header-logo" src="ags-logo.png" alt="AGS">
    </div>
    <div class="header-badge">מפרט טכני</div>
  </div>

  <!-- Project Title -->
  <div class="title-section">
    <div class="project-label">פרויקט סולארי</div>
    <div class="project-name" id="projectName"></div>
    <div class="project-address" id="projectAddress"></div>
  </div>

  <!-- Technical Specs -->
  <div class="specs-section">
    <div class="specs-title">מפרט טכני</div>
    <div class="specs-grid" id="specsGrid"></div>
  </div>

  <!-- Design Image -->
  <div class="image-section" id="imageSection"></div>

  <!-- Signature Section -->
  <div class="signature-section" id="signatureSection">
    <div class="sig-title">אישור לקוח</div>

    <div class="terms-block" id="termsBlock"></div>

    <div class="sig-grid">
      <div class="sig-field">
        <label>שם מלא</label>
        <input type="text" id="sigName" placeholder="הכנס שם מלא">
      </div>
      <div class="sig-field">
        <label>ת.ז.</label>
        <input type="text" id="sigId" placeholder="מספר תעודת זהות" inputmode="numeric">
      </div>
      <div class="sig-field">
        <label>אימייל</label>
        <input type="email" id="sigEmail" placeholder="כתובת אימייל">
      </div>
      <div class="sig-field">
        <label>תאריך</label>
        <input type="text" id="sigDate" readonly>
      </div>
    </div>

    <div class="sig-canvas-wrap" id="canvasWrap">
      <span class="sig-placeholder" id="sigPlaceholder">✍️ חתום כאן עם העכבר או האצבע</span>
      <canvas id="sigCanvas"></canvas>
    </div>
    <div class="sig-actions">
      <button class="btn-clear" onclick="clearSignature()">🗑️ נקה חתימה</button>
    </div>

    <label class="sig-agree">
      <input type="checkbox" id="sigAgree">
      <span>קראתי את התנאים לעיל ואני מאשר/ת את תוכן המפרט הטכני</span>
    </label>

    <button class="sig-btn" id="sigBtn" onclick="submitSignature()">✓ אישור וחתימה</button>
    <div class="sig-error" id="sigError"></div>

    <div class="progress-bar" id="progressBar">
      <div class="progress-text" id="progressText">שומר חתימה...</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    SEMO AGS — סמו א.ג.ס בע"מ · כל הזכויות שמורות
  </div>

</div>

<script src="signature-service.js"></script>
<script src="post-sign-service.js"></script>
<script>
(function() {
  const WORKER_URL = 'https://s-a.gs';
  const DOC_TYPE = 'spec';

  // ── Terms Content (editable separately) ──
  const SPEC_TERMS = [
    'אני מאשר/ת כי קיבלתי לעיוני מפרט טכני מלא של המערכת, לרבות הספקי המערכת (DC ו-AC), מספר הפאנלים, סוג הציוד ושרטוט פריסת הפאנלים על גג הנכס, וכי בדקתי ואישרתי את תכנון המערכת כפי שמוצג במסמך זה.',
    'ידוע לי כי ההספק הסופי של המערכת (DC) נקבע בהתאם לתכנון ולפריסה שאושרו על ידי במסמך זה, וכי הספק זה מהווה את הבסיס לחישוב עלות המערכת.',
    'אני מבין/ה כי תמחור המערכת מבוסס על מחיר ליחידת הספק (קילו-וואט DC), ולכן כל שינוי בהספק המערכת משפיע ישירות על המחיר הכולל, וכי ההספק הסופי עשוי להיות שונה מההספק שהוצג בהצעת המחיר הראשונית.',
    'לאחר אישורי למסמך זה, תופק עבורי הזמנת עבודה הכוללת את ההספק הסופי שאושר ואת העלות הכוללת בהתאם, והזמנה זו תהווה מסמך מחייב לביצוע העבודה ותחליף כל התייחסות קודמת להספק או למחיר.',
  ];

  // ── Load spec data ──
  const specData = window.__SPEC_DATA__;
  if (!specData) {
    document.querySelector('.page').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px;">
        <div>
          <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
          <h2 style="color:#0A1628;margin-bottom:8px;">המפרט לא נמצא</h2>
          <p style="color:#6B7280;">ייתכן שהקישור שגוי או שהמפרט פג תוקפו.</p>
        </div>
      </div>`;
    return;
  }

  // ── Extract doc ID from URL ──
  const docId = window.__SPEC_DOC_ID__ || location.pathname.split('/').pop() || '';

  // ── Populate project info ──
  document.getElementById('projectName').textContent = specData.projectName || '';
  document.getElementById('projectAddress').textContent = '📍 ' + (specData.address || '');
  document.title = `מפרט טכני — ${specData.projectName || ''} | SEMO AGS`;

  // ── Build specs grid ──
  const specs = [
    { label: 'הספק DC', value: specData.kwp, unit: 'kWp', highlight: true },
    { label: 'הספק AC', value: specData.acPower, unit: 'kW', highlight: true },
    { label: 'גודל חיבור', value: specData.connectionSize },
    { label: 'מספר פאנלים', value: specData.numModules },
    { label: 'דגם פאנלים', value: specData.solarModule, full: true },
    { label: 'דגם ממיר', value: specData.solarInverter, full: true },
  ];

  const grid = document.getElementById('specsGrid');
  specs.forEach(s => {
    if (!s.value) return;
    const card = document.createElement('div');
    card.className = 'spec-card' + (s.full ? ' full' : '') + (s.highlight ? ' highlight' : '');
    const unitHtml = s.unit ? ` <small>${s.unit}</small>` : '';
    const fontSize = s.full ? ' style="font-size:16px;"' : '';
    card.innerHTML = `
      <div class="spec-label">${s.label}</div>
      <div class="spec-value"${fontSize}>${s.value}${unitHtml}</div>`;
    grid.appendChild(card);
  });

  // ── Design image ──
  const imgSection = document.getElementById('imageSection');
  if (specData.designImageUrl) {
    imgSection.innerHTML = `
      <div class="image-title">תמונת הדמייה — מבט על</div>
      <img class="design-image" src="${specData.designImageUrl}" alt="הדמיית מערכת סולארית"
           onerror="this.outerHTML='<div class=\\'no-image\\'>תמונת ההדמייה לא זמינה</div>'">`;
  } else {
    imgSection.innerHTML = `
      <div class="image-title">תמונת הדמייה — מבט על</div>
      <div class="no-image">תמונת הדמייה לא זמינה</div>`;
  }

  // ── Render terms ──
  document.getElementById('termsBlock').innerHTML = SPEC_TERMS.map(p => `<p>${p}</p>`).join('');

  // ── Set date ──
  document.getElementById('sigDate').value = new Date().toLocaleDateString('he-IL');

  // ── Init signature canvas ──
  const sigService = new SignatureService('sigCanvas');
  sigService.init();

  // Hide placeholder on first draw
  const canvas = document.getElementById('sigCanvas');
  canvas.addEventListener('mousedown', hidePlaceholder);
  canvas.addEventListener('touchstart', hidePlaceholder);
  function hidePlaceholder() {
    document.getElementById('sigPlaceholder').style.display = 'none';
  }

  window.clearSignature = function() {
    sigService.clear();
    document.getElementById('sigPlaceholder').style.display = '';
  };

  // ── Check if already signed ──
  if (window.__SIGNATURE_DATA__ && window.__SIGNATURE_DATA__.signed) {
    showSignedState(window.__SIGNATURE_DATA__);
    return;
  }

  // Also check via API
  PostSignService.checkSignature(docId).then(result => {
    if (result.signed && result.docType === DOC_TYPE) {
      showSignedState(result);
    }
  });

  function showSignedState(sig) {
    const section = document.getElementById('signatureSection');
    let sigImgHtml = '';
    if (sig.sigImg) {
      sigImgHtml = `<img class="signed-sig-img" src="${sig.sigImg}" alt="חתימה">`;
    }
    section.innerHTML = `
      <div class="signed-banner">
        <div class="signed-icon">✅</div>
        <div class="signed-title">המפרט נחתם בהצלחה</div>
        <div class="signed-info">
          חותם: ${sig.signerName || ''}<br>
          ת.ז.: ${sig.signerId || ''}<br>
          תאריך: ${sig.dateStr || ''}<br>
          ${sig.refID ? 'מזהה: ' + sig.refID : ''}
        </div>
        ${sigImgHtml}
      </div>`;
  }

  // ── Submit signature ──
  window.submitSignature = async function() {
    const btn = document.getElementById('sigBtn');
    const errorEl = document.getElementById('sigError');
    errorEl.style.display = 'none';

    // Clear previous error states
    document.querySelectorAll('.sig-field input.error').forEach(el => el.classList.remove('error'));
    document.getElementById('canvasWrap').classList.remove('error');

    const name = document.getElementById('sigName').value.trim();
    const idNum = document.getElementById('sigId').value.trim();
    const email = document.getElementById('sigEmail').value.trim();
    const sigDate = document.getElementById('sigDate').value;
    const agreed = document.getElementById('sigAgree').checked;

    // Collect signature
    const result = await sigService.collect({
      name, idNum, email, sigDate, agreed,
      quoteSnapshot: specData,
      clientData: { name: specData.projectName, address: specData.address },
    });

    if (!result.ok) {
      // Highlight errors
      const errorMap = {
        name: 'sigName', idNum: 'sigId', email: 'sigEmail',
        sigDate: 'sigDate', canvas: 'canvasWrap', agree: null,
      };
      result.errors.forEach(e => {
        if (e === 'canvas') {
          document.getElementById('canvasWrap').classList.add('error');
        } else if (errorMap[e]) {
          document.getElementById(errorMap[e]).classList.add('error');
        }
      });

      const messages = {
        name: 'שם מלא (לפחות 2 תווים)',
        idNum: 'מספר ת.ז. תקין',
        email: 'כתובת אימייל תקינה',
        sigDate: 'תאריך',
        canvas: 'חתימה על המסמך',
        agree: 'אישור תנאים',
      };
      const missing = result.errors.map(e => messages[e] || e).join(', ');
      errorEl.textContent = 'חסר: ' + missing;
      errorEl.style.display = 'block';
      return;
    }

    // Disable button, show progress
    btn.disabled = true;
    btn.textContent = 'שומר...';
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    progressBar.classList.add('show');

    const processResult = await PostSignService.process({
      docType: DOC_TYPE,
      docId: docId,
      signature: result.signature,
      emailData: {
        clientName: specData.projectName,
        clientEmail: email,
        docUrl: window.location.href,
      },
      onLock: () => {
        showSignedState({
          signerName: name,
          signerId: idNum.slice(0, 2) + '*****' + idNum.slice(-2),
          dateStr: result.signature.dateStr,
          refID: result.signature.refID,
          sigImg: result.signature.sigImg,
          signed: true,
        });
      },
      onProgress: (step, ok, error) => {
        if (step === 'save' && ok === null) {
          progressText.textContent = 'שומר חתימה...';
          progressFill.style.width = '30%';
        } else if (step === 'save' && ok) {
          progressText.textContent = 'חתימה נשמרה! שולח אישורים...';
          progressFill.style.width = '60%';
        } else if (step === 'notify') {
          progressText.textContent = 'שולח אישורים במייל...';
          progressFill.style.width = '80%';
        } else if (step === 'done') {
          progressText.textContent = 'הושלם בהצלחה!';
          progressFill.style.width = '100%';
        }
      },
    });

    if (!processResult.saved) {
      btn.disabled = false;
      btn.textContent = '✓ אישור וחתימה';
      progressBar.classList.remove('show');
      errorEl.textContent = 'שגיאה בשמירת החתימה. נסה שוב.';
      errorEl.style.display = 'block';
    }
  };
})();
</script>
</body>
