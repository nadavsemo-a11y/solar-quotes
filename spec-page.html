<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מפרט טכני — SEMO A.G.S</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* A.G.S Design System — black / white / mint, hard geometry, Heebo. */
  :root {
    --ags-black: #0A0A0A;
    --ags-white: #FFFFFF;
    --ags-mint: #9CF5C4;
    --ags-mint-deep: #5FE0A0;
    --ags-mint-soft: #D8FBE7;
    --ink-900: #0A0A0A;
    --ink-700: #2B2B2B;
    --ink-500: #6B6B6B;
    --ink-400: #9A9A9A;
    --ink-300: #C4C4C4;
    --ink-200: #E4E4E4;
    --ink-100: #F2F2F2;
    --ink-50:  #F8F8F8;
    --error: #D43A2F;
    --font-sans: "Heebo", "Helvetica Neue", "Segoe UI", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
    --r-sm: 2px;
    --r-md: 4px;
    --shadow-hard: 4px 4px 0 var(--ags-black);
    --ease: cubic-bezier(0.2, 0.7, 0.2, 1);
    --dur: 120ms;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--ink-50);
    color: var(--ink-900);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .page {
    max-width: 800px;
    margin: 0 auto;
    background: var(--ags-white);
    min-height: 100vh;
    border-inline: 1.5px solid var(--ink-200);
  }

  /* Header — pure black, white logo, mono mint eyebrow */
  .header {
    background: var(--ags-black);
    padding: 26px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .header img.header-logo { height: 34px; filter: brightness(0) invert(1); }
  .header-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    color: var(--ags-mint);
  }

  /* Project Title — Heebo Black, mint dash eyebrow, hard black rule */
  .title-section {
    padding: 40px 40px 28px;
    border-bottom: 2px solid var(--ags-black);
  }
  .project-label {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--ink-500);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .project-label::before {
    content: "";
    width: 20px;
    height: 3px;
    background: var(--ags-mint);
    display: inline-block;
  }
  .project-name {
    font-size: clamp(30px, 5vw, 44px);
    font-weight: 900;
    color: var(--ags-black);
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .project-address { font-size: 15px; color: var(--ink-500); }

  /* Section headings — mono uppercase, hard underline */
  .specs-section { padding: 32px 40px; }
  .specs-title, .image-title, .sig-title {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--ags-black);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 1.5px solid var(--ink-200);
  }

  /* Hero stats (DC / AC) — bordered stat block, mono units, tabular nums */
  .stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border: 2px solid var(--ags-black);
    border-radius: var(--r-md);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .stat { padding: 22px 24px; border-inline-start: 1.5px solid var(--ink-200); }
  .stat:first-child { border-inline-start: 0; }
  .stat.accent { background: var(--ags-mint); }
  .stat .lbl {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-500);
    margin-bottom: 8px;
  }
  .stat.accent .lbl { color: var(--ink-700); }
  .stat .num {
    font-weight: 900;
    font-size: 40px;
    line-height: 1;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    color: var(--ags-black);
  }
  .stat .num .unit {
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 500;
    color: var(--ink-500);
    margin-inline-start: 5px;
    letter-spacing: 0.04em;
  }
  .stat.accent .num .unit { color: var(--ink-700); }

  /* Spec cards — flat, hover lifts with the signature offset shadow */
  .specs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .spec-card {
    background: var(--ags-white);
    border: 1.5px solid var(--ink-200);
    border-radius: var(--r-md);
    padding: 16px 18px;
    transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease), border-color var(--dur) var(--ease);
  }
  .spec-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: var(--shadow-hard);
    border-color: var(--ags-black);
  }
  .spec-card.full { grid-column: 1 / -1; }
  .spec-label {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-500);
    margin-bottom: 6px;
  }
  .spec-value {
    font-size: 18px;
    font-weight: 800;
    color: var(--ags-black);
    letter-spacing: -0.01em;
  }
  .spec-value small {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-500);
  }

  /* Design image */
  .image-section { padding: 0 40px 32px; }
  .design-image {
    width: 100%;
    display: block;
    border: 1.5px solid var(--ink-200);
    border-radius: var(--r-md);
  }
  .no-image {
    background: var(--ink-50);
    border: 1.5px dashed var(--ink-300);
    border-radius: var(--r-md);
    padding: 44px;
    text-align: center;
    color: var(--ink-400);
    font-size: 14px;
    font-weight: 500;
  }

  /* Signature section */
  .signature-section {
    padding: 32px 40px 40px;
    border-top: 1.5px solid var(--ink-200);
    margin-top: 8px;
  }

  /* Terms block */
  .terms-block {
    background: var(--ink-50);
    border: 1.5px solid var(--ink-200);
    border-radius: var(--r-md);
    padding: 22px;
    margin-bottom: 24px;
    font-size: 13.5px;
    line-height: 1.85;
    color: var(--ink-700);
  }
  .terms-block p { margin-bottom: 12px; }
  .terms-block p:last-child { margin-bottom: 0; }

  .sig-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-bottom: 24px;
  }
  .sig-field label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--ags-black);
    margin-bottom: 6px;
  }
  .sig-field input {
    width: 100%;
    border: 1.5px solid var(--ink-300);
    border-radius: var(--r-md);
    padding: 11px 14px;
    font-family: var(--font-sans);
    font-size: 15px;
    color: var(--ags-black);
    background: var(--ags-white);
    outline: none;
    transition: border-color var(--dur), box-shadow var(--dur);
  }
  .sig-field input:focus { border-color: var(--ags-black); box-shadow: 0 0 0 2px var(--ags-mint); }
  .sig-field input.error { border-color: var(--error); box-shadow: 0 0 0 2px rgba(212,58,47,0.18); }

  .sig-canvas-wrap {
    border: 1.5px dashed var(--ink-300);
    border-radius: var(--r-md);
    position: relative;
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-400);
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 10px;
    background: var(--ink-50);
    cursor: crosshair;
    overflow: hidden;
  }
  .sig-canvas-wrap.error { border-color: var(--error); }
  .sig-canvas-wrap canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  .sig-placeholder { pointer-events: none; z-index: 1; }

  .sig-actions { display: flex; gap: 12px; margin-bottom: 20px; }
  .btn-clear {
    background: var(--ags-white);
    border: 1.5px solid var(--ink-300);
    border-radius: var(--r-md);
    padding: 8px 16px;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-700);
    cursor: pointer;
    transition: all var(--dur) var(--ease);
  }
  .btn-clear:hover { border-color: var(--ags-black); color: var(--ags-black); }
  .btn-clear:active { transform: translate(1px, 1px); }

  .sig-agree {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 22px;
    font-size: 14px;
    color: var(--ink-700);
    cursor: pointer;
  }
  .sig-agree input[type="checkbox"] {
    margin-top: 2px;
    width: 18px;
    height: 18px;
    accent-color: var(--ags-mint-deep);
    flex-shrink: 0;
  }

  /* Primary CTA — mint fill, black border + text, signature offset shadow */
  .sig-btn {
    background: var(--ags-mint);
    color: var(--ags-black);
    border: 2px solid var(--ags-black);
    border-radius: var(--r-md);
    padding: 15px 32px;
    font-family: var(--font-sans);
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    width: 100%;
    box-shadow: var(--shadow-hard);
    transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease), background var(--dur);
  }
  .sig-btn:hover { background: var(--ags-mint-deep); transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ags-black); }
  .sig-btn:active { transform: translate(2px, 2px); box-shadow: none; }
  .sig-btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; transform: none; }

  .sig-error {
    color: var(--error);
    font-size: 13px;
    font-weight: 600;
    margin-top: 12px;
    text-align: center;
    display: none;
  }

  /* Signed state — mint-soft panel, black border, stroke check */
  .signed-banner {
    background: var(--ags-mint-soft);
    border: 2px solid var(--ags-black);
    border-radius: var(--r-md);
    padding: 28px 24px;
    text-align: center;
  }
  .signed-check {
    width: 48px; height: 48px;
    border-radius: 999px;
    background: var(--ags-mint);
    border: 2px solid var(--ags-black);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
  }
  .signed-check svg { width: 26px; height: 26px; stroke: var(--ags-black); stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .signed-title { font-size: 20px; font-weight: 900; letter-spacing: -0.01em; color: var(--ags-black); margin-bottom: 10px; }
  .signed-info { font-family: var(--font-mono); font-size: 13px; color: var(--ink-700); line-height: 1.9; }
  .signed-sig-img { max-width: 200px; margin-top: 14px; mix-blend-mode: multiply; opacity: 0.85; }

  /* Progress */
  .progress-bar { display: none; margin-top: 16px; }
  .progress-bar.show { display: block; }
  .progress-text { font-family: var(--font-mono); font-size: 12px; color: var(--ink-500); text-align: center; margin-bottom: 8px; }
  .progress-track { height: 4px; background: var(--ink-200); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--ags-mint-deep); border-radius: 999px; transition: width 0.4s var(--ease); width: 0; }

  /* Footer — black, company stamp + legal line */
  .footer {
    background: var(--ags-black);
    padding: 28px 40px;
    text-align: center;
    color: rgba(255,255,255,0.55);
    font-size: 12px;
  }
  .footer-stamp { height: 64px; margin-bottom: 14px; }
  .footer-legal { font-family: var(--font-mono); letter-spacing: 0.04em; }

  @media (max-width: 600px) {
    .header { padding: 22px 20px; }
    .title-section { padding: 28px 20px 22px; }
    .project-name { font-size: 28px; }
    .specs-section { padding: 24px 20px; }
    .specs-grid { grid-template-columns: 1fr; }
    .stat-row { grid-template-columns: 1fr; }
    .stat { border-inline-start: 0; }
    .stat:first-child { border-bottom: 1.5px solid var(--ink-200); }
    .image-section { padding: 0 20px 24px; }
    .signature-section { padding: 24px 20px 32px; }
    .sig-grid { grid-template-columns: 1fr; }
    .footer { padding: 22px 20px; }
  }

  @media print {
    .page { border: none; }
    .signature-section { page-break-inside: avoid; }
    .sig-btn { display: none; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="header-right">
      <img class="header-logo" src="ags-logo.png" alt="A.G.S">
    </div>
    <div class="header-badge">מפרט טכני</div>
  </div>

  <!-- Project Title -->
  <div class="title-section">
    <div class="project-label">פרויקט סולארי</div>
    <div class="project-name" id="projectName"></div>
    <div class="project-address" id="projectAddress"></div>
  </div>

  <!-- Technical Specs -->
  <div class="specs-section">
    <div class="specs-title">מפרט טכני</div>
    <div class="stat-row" id="statRow"></div>
    <div class="specs-grid" id="specsGrid"></div>
  </div>

  <!-- Design Image -->
  <div class="image-section" id="imageSection"></div>

  <!-- Signature Section -->
  <div class="signature-section" id="signatureSection">
    <div class="sig-title">אישור לקוח</div>

    <div class="terms-block" id="termsBlock"></div>

    <div class="sig-grid">
      <div class="sig-field">
        <label>שם מלא</label>
        <input type="text" id="sigName" placeholder="הכנס שם מלא">
      </div>
      <div class="sig-field">
        <label>ת.ז.</label>
        <input type="text" id="sigId" placeholder="מספר תעודת זהות" inputmode="numeric">
      </div>
      <div class="sig-field">
        <label>אימייל</label>
        <input type="email" id="sigEmail" placeholder="כתובת אימייל">
      </div>
      <div class="sig-field">
        <label>תאריך</label>
        <input type="text" id="sigDate" readonly>
      </div>
    </div>

    <div class="sig-canvas-wrap" id="canvasWrap">
      <span class="sig-placeholder" id="sigPlaceholder">חתום כאן עם העכבר או האצבע</span>
      <canvas id="sigCanvas"></canvas>
    </div>
    <div class="sig-actions">
      <button class="btn-clear" onclick="clearSignature()">נקה חתימה</button>
    </div>

    <label class="sig-agree">
      <input type="checkbox" id="sigAgree">
      <span>קראתי את התנאים לעיל ואני מאשר/ת את תוכן המפרט הטכני</span>
    </label>

    <button class="sig-btn" id="sigBtn" onclick="submitSignature()">אישור וחתימה</button>
    <div class="sig-error" id="sigError"></div>

    <div class="progress-bar" id="progressBar">
      <div class="progress-text" id="progressText">שומר חתימה...</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <img class="footer-stamp" src="stamp-hebrew.gif" alt="חותמת סמו א.ג.ס" onerror="this.style.display='none'">
    <div class="footer-legal">SEMO A.G.S — סמו א.ג.ס בע"מ · כל הזכויות שמורות</div>
  </div>

</div>

<!-- signature-service.js load removed — SignatureCapture imported via module below. -->
<script src="post-sign-service.js"></script>
<script type="module">
import { SignatureCapture as SignatureService } from './signature/index.js';

(function() {
  const WORKER_URL = 'https://s-a.gs';
  const YARON_WORKER_URL = 'https://monday-yaron.monday-shimrit.workers.dev';
  const DOC_TYPE = 'spec';

  // ── Terms Content (editable separately) ──
  const SPEC_TERMS = [
    'אני מאשר/ת כי קיבלתי לעיוני מפרט טכני מלא של המערכת, לרבות הספקי המערכת (DC ו-AC), מספר הפאנלים, סוג הציוד ושרטוט פריסת הפאנלים על גג הנכס, וכי בדקתי ואישרתי את תכנון המערכת כפי שמוצג במסמך זה.',
    'ידוע לי כי ההספק הסופי של המערכת (DC) נקבע בהתאם לתכנון ולפריסה שאושרו על ידי במסמך זה, וכי הספק זה מהווה את הבסיס לחישוב עלות המערכת.',
    'אני מבין/ה כי תמחור המערכת מבוסס על מחיר ליחידת הספק (קילו-וואט DC), ולכן כל שינוי בהספק המערכת משפיע ישירות על המחיר הכולל, וכי ההספק הסופי עשוי להיות שונה מההספק שהוצג בהצעת המחיר הראשונית.',
    'לאחר אישורי למסמך זה, תופק עבורי הזמנת עבודה הכוללת את ההספק הסופי שאושר ואת העלות הכוללת בהתאם, והזמנה זו תהווה מסמך מחייב לביצוע העבודה ותחליף כל התייחסות קודמת להספק או למחיר.',
    'שינויים בפריסת הפאנלים לאחר החתימה יחויבו בתשלום נוסף בגין תכנון, תוספת ציוד ועבודה.',
  ];

  // ── Load spec data ──
  const specData = window.__SPEC_DATA__;
  if (!specData) {
    document.querySelector('.page').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px;">
        <div>
          <h2 style="font-family:'Heebo',sans-serif;font-weight:900;color:#0A0A0A;margin-bottom:8px;">המפרט לא נמצא</h2>
          <p style="font-family:'Heebo',sans-serif;color:#6B6B6B;">ייתכן שהקישור שגוי או שהמפרט פג תוקפו.</p>
        </div>
      </div>`;
    return;
  }

  // ── Extract doc ID from URL ──
  const docId = window.__SPEC_DOC_ID__ || location.pathname.split('/').pop() || '';

  // ── Populate project info ──
  document.getElementById('projectName').textContent = specData.projectName || '';
  document.getElementById('projectAddress').textContent = specData.address || '';
  document.title = `מפרט טכני — ${specData.projectName || ''} | SEMO A.G.S`;

  // ── Build specs ──
  // Highlight metrics (DC/AC) render as a bordered stat block with mono units;
  // the rest render as flat hover-lift cards.
  const specs = [
    { label: 'הספק DC', value: specData.kwp, unit: 'kWp', highlight: true },
    { label: 'הספק AC', value: specData.acPower, unit: 'kW', highlight: true },
    { label: 'גודל חיבור', value: specData.connectionSize },
    { label: 'מספר פאנלים', value: specData.numModules },
    { label: 'דגם פאנלים', value: specData.solarModule, full: true },
    { label: 'דגם ממיר', value: specData.solarInverter, full: true },
  ];

  const grid = document.getElementById('specsGrid');
  const statRow = document.getElementById('statRow');
  let statCount = 0;
  specs.forEach(s => {
    if (!s.value) return;
    if (s.highlight) {
      const stat = document.createElement('div');
      stat.className = 'stat' + (statCount === 0 ? ' accent' : '');
      statCount++;
      const unitHtml = s.unit ? ` <span class="unit">${s.unit}</span>` : '';
      stat.innerHTML = `
        <div class="lbl">${s.label}</div>
        <div class="num">${s.value}${unitHtml}</div>`;
      statRow.appendChild(stat);
    } else {
      const card = document.createElement('div');
      card.className = 'spec-card' + (s.full ? ' full' : '');
      const unitHtml = s.unit ? ` <small>${s.unit}</small>` : '';
      const fontSize = s.full ? ' style="font-size:16px;"' : '';
      card.innerHTML = `
        <div class="spec-label">${s.label}</div>
        <div class="spec-value"${fontSize}>${s.value}${unitHtml}</div>`;
      grid.appendChild(card);
    }
  });
  if (statCount === 0) statRow.style.display = 'none';

  // ── Design image ──
  const imgSection = document.getElementById('imageSection');
  if (specData.designImageUrl) {
    imgSection.innerHTML = `
      <div class="image-title">תמונת הדמייה — מבט על</div>
      <img class="design-image" src="${specData.designImageUrl}" alt="הדמיית מערכת סולארית"
           onerror="this.outerHTML='<div class=\\'no-image\\'>תמונת ההדמייה לא זמינה</div>'">`;
  } else {
    imgSection.innerHTML = `
      <div class="image-title">תמונת הדמייה — מבט על</div>
      <div class="no-image">תמונת הדמייה לא זמינה</div>`;
  }

  // ── Render terms ──
  document.getElementById('termsBlock').innerHTML = SPEC_TERMS.map(p => `<p>${p}</p>`).join('');

  // ── Set date ──
  document.getElementById('sigDate').value = new Date().toLocaleDateString('he-IL');

  // ── Init signature canvas ──
  // includeDocumentHtml opt-in (15A.1): collect() attaches the page's final
  // outerHTML to the signature, which the Worker persists under html:${docId}
  // for the new PDF pipeline (15A.2 / 15A.4).
  const sigService = new SignatureService('sigCanvas', {
    capture: { includeDocumentHtml: true },
  });
  sigService.init();

  // Hide placeholder on first draw
  const canvas = document.getElementById('sigCanvas');
  canvas.addEventListener('mousedown', hidePlaceholder);
  canvas.addEventListener('touchstart', hidePlaceholder);
  function hidePlaceholder() {
    document.getElementById('sigPlaceholder').style.display = 'none';
  }

  window.clearSignature = function() {
    sigService.clear();
    document.getElementById('sigPlaceholder').style.display = '';
  };

  // ── Check if already signed ──
  if (window.__SIGNATURE_DATA__ && window.__SIGNATURE_DATA__.signed) {
    showSignedState(window.__SIGNATURE_DATA__);
    return;
  }

  // Also check via API
  PostSignService.checkSignature(docId).then(result => {
    if (result.signed && result.docType === DOC_TYPE) {
      showSignedState(result);
    }
  });

  function showSignedState(sig) {
    const section = document.getElementById('signatureSection');
    let sigImgHtml = '';
    if (sig.sigImg) {
      sigImgHtml = `<img class="signed-sig-img" src="${sig.sigImg}" alt="חתימה">`;
    }
    section.innerHTML = `
      <div class="signed-banner">
        <div class="signed-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="signed-title">המפרט נחתם בהצלחה</div>
        <div class="signed-info">
          חותם: ${sig.signerName || ''}<br>
          ת.ז.: ${sig.signerId || ''}<br>
          תאריך: ${sig.dateStr || ''}<br>
          ${sig.refID ? 'מזהה: ' + sig.refID : ''}
        </div>
        ${sigImgHtml}
      </div>`;
  }

  // ── Submit signature ──
  window.submitSignature = async function() {
    const btn = document.getElementById('sigBtn');
    const errorEl = document.getElementById('sigError');
    errorEl.style.display = 'none';

    // Clear previous error states
    document.querySelectorAll('.sig-field input.error').forEach(el => el.classList.remove('error'));
    document.getElementById('canvasWrap').classList.remove('error');

    const name = document.getElementById('sigName').value.trim();
    const idNum = document.getElementById('sigId').value.trim();
    const email = document.getElementById('sigEmail').value.trim();
    const sigDate = document.getElementById('sigDate').value;
    const agreed = document.getElementById('sigAgree').checked;

    // Collect signature
    const result = await sigService.collect({
      name, idNum, email, sigDate, agreed,
      quoteSnapshot: specData,
      clientData: { name: specData.projectName, address: specData.address },
    });

    if (!result.ok) {
      // Highlight errors
      const errorMap = {
        name: 'sigName', idNum: 'sigId', email: 'sigEmail',
        sigDate: 'sigDate', canvas: 'canvasWrap', agree: null,
      };
      result.errors.forEach(e => {
        if (e === 'canvas') {
          document.getElementById('canvasWrap').classList.add('error');
        } else if (errorMap[e]) {
          document.getElementById(errorMap[e]).classList.add('error');
        }
      });

      const messages = {
        name: 'שם מלא (לפחות 2 תווים)',
        idNum: 'מספר ת.ז. תקין',
        email: 'כתובת אימייל תקינה',
        sigDate: 'תאריך',
        canvas: 'חתימה על המסמך',
        agree: 'אישור תנאים',
      };
      const missing = result.errors.map(e => messages[e] || e).join(', ');
      errorEl.textContent = 'חסר: ' + missing;
      errorEl.style.display = 'block';
      return;
    }

    // Disable button, show progress
    btn.disabled = true;
    btn.textContent = 'שומר...';
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    progressBar.classList.add('show');

    const processResult = await PostSignService.process({
      docType: DOC_TYPE,
      docId: docId,
      signature: result.signature,
      emailData: {
        clientName: specData.projectName,
        clientEmail: email,
        docUrl: window.location.href,
      },
      onLock: () => {
        showSignedState({
          signerName: name,
          signerId: idNum.slice(0, 2) + '*****' + idNum.slice(-2),
          dateStr: result.signature.dateStr,
          refID: result.signature.refID,
          sigImg: result.signature.sigImg,
          signed: true,
        });
      },
      onProgress: (step, ok, error) => {
        if (step === 'save' && ok === null) {
          progressText.textContent = 'שומר חתימה...';
          progressFill.style.width = '30%';
        } else if (step === 'save' && ok) {
          progressText.textContent = 'חתימה נשמרה! שולח אישורים...';
          progressFill.style.width = '60%';
        } else if (step === 'notify') {
          progressText.textContent = 'שולח אישורים במייל...';
          progressFill.style.width = '80%';
        } else if (step === 'done') {
          progressText.textContent = 'הושלם בהצלחה!';
          progressFill.style.width = '100%';
        }
      },
    });

    // Update Monday task status to "בוצע" after successful signature
    if (processResult.saved && specData.subitemId) {
      try {
        fetch(`${YARON_WORKER_URL}/update-status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ itemId: specData.subitemId, newStatus: 'בוצע' }),
        }).catch(() => {});
      } catch { /* best effort */ }
    }

    if (!processResult.saved) {
      btn.disabled = false;
      btn.textContent = 'אישור וחתימה';
      progressBar.classList.remove('show');
      errorEl.textContent = 'שגיאה בשמירת החתימה. נסה שוב.';
      errorEl.style.display = 'block';
    }
  };
})();
</script>
</body>
</html>
