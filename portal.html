<style>
/* ── Design Tokens ───────────────────────────────── */
:root {
  --bg: #080a10;
  --bg-2: #0d1018;
  --surface: #141822;
  --surface-2: #1a2030;
  --surface-3: #222a3a;
  --surface-hover: #1e2638;
  --accent: #4f8ef7;
  --accent-glow: rgba(79,142,247,0.15);
  --sun: #F4A200;
  --sun-light: #FFD166;
  --sun-glow: rgba(244,162,0,0.12);
  --green: #2ECC71;
  --green-glow: rgba(46,204,113,0.12);
  --purple: #a47bfc;
  --purple-glow: rgba(164,123,252,0.12);
  --pink: #f472b6;
  --pink-glow: rgba(244,114,182,0.12);
  --cyan: #22d3ee;
  --cyan-glow: rgba(34,211,238,0.12);
  --red: #ef4444;
  --orange: #f59e0b;
  --text: #e8ecf4;
  --text-2: #8892a4;
  --text-3: #515b6e;
  --border: #1e2536;
  --border-2: #2a3348;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── Reset & Base ────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

/* ── Animated Background ─────────────────────────── */
.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(79,142,247,0.03) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(244,162,0,0.03) 0%, transparent 50%);
}
.bg-grid::after {
  content: ''; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(79,142,247,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,142,247,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}

/* ── Header ──────────────────────────────────────── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,10,16,0.85);
  backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}
.header-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 64px; gap: 16px;
}
.header-brand {
  display: flex; align-items: center; gap: 12px;
}
.header-logo {
  height: 32px;
  filter: brightness(0) invert(1);
}
.header-title {
  font-size: 18px; font-weight: 700;
  background: linear-gradient(135deg, var(--text), var(--sun-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-subtitle {
  font-size: 11px; color: var(--text-3); font-weight: 400;
  letter-spacing: 2px; text-transform: uppercase;
}

/* ── Search Bar ──────────────────────────────────── */
.search-wrap {
  position: relative; flex: 0 1 320px;
}
.search-wrap svg {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  width: 18px; height: 18px; color: var(--text-3);
}
.search-input {
  width: 100%; padding: 10px 14px 10px 42px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 14px; font-family: inherit;
  transition: var(--transition);
}
.search-input::placeholder { color: var(--text-3); }
.search-input:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

/* ── Clock ───────────────────────────────────────── */
.header-clock {
  font-size: 13px; color: var(--text-2);
  font-variant-numeric: tabular-nums;
  display: flex; align-items: center; gap: 8px;
}
.clock-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(46,204,113,0.4); }
  50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(46,204,113,0); }
}

/* ── Main Layout ─────────────────────────────────── */
.main {
  position: relative; z-index: 1;
  max-width: 1400px; margin: 0 auto;
  padding: 32px 24px 60px;
}

/* ── Hero Stats Bar ──────────────────────────────── */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 36px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  display: flex; align-items: center; gap: 14px;
  transition: var(--transition);
}
.stat-card:hover {
  border-color: var(--border-2);
  transform: translateY(-1px);
}
.stat-icon {
  width: 42px; height: 42px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.stat-icon.sun { background: var(--sun-glow); }
.stat-icon.blue { background: var(--accent-glow); }
.stat-icon.green { background: var(--green-glow); }
.stat-icon.purple { background: var(--purple-glow); }
.stat-value { font-size: 24px; font-weight: 800; line-height: 1; }
.stat-label { font-size: 12px; color: var(--text-2); margin-top: 2px; }

/* ── Category Filter ─────────────────────────────── */
.category-bar {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.cat-btn {
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 13px; font-weight: 500;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-2);
  transition: var(--transition);
}
.cat-btn:hover { border-color: var(--border-2); color: var(--text); }
.cat-btn.active {
  background: var(--accent); border-color: var(--accent);
  color: #fff; font-weight: 600;
}

/* ── Section Title ───────────────────────────────── */
.section {
  margin-bottom: 36px;
}
.section-title {
  font-size: 15px; font-weight: 600; color: var(--text-2);
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
  text-transform: uppercase; letter-spacing: 1.5px;
}
.section-title::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(to left, transparent, var(--border));
}

/* ── Module Cards Grid ───────────────────────────── */
.modules-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

/* ── Module Card ─────────────────────────────────── */
.module-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  display: flex; flex-direction: column; gap: 14px;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
  cursor: pointer;
}
.module-card::before {
  content: '';
  position: absolute; top: 0; right: 0; left: 0; height: 3px;
  border-radius: var(--radius) var(--radius) 0 0;
  opacity: 0; transition: var(--transition);
}
.module-card:hover {
  border-color: var(--border-2);
  transform: translateY(-3px);
  box-shadow: var(--shadow);
}
.module-card:hover::before { opacity: 1; }
.module-card[data-color="sun"]::before { background: linear-gradient(90deg, var(--sun), var(--sun-light)); }
.module-card[data-color="blue"]::before { background: linear-gradient(90deg, var(--accent), #7bb3ff); }
.module-card[data-color="green"]::before { background: linear-gradient(90deg, var(--green), #5eeea0); }
.module-card[data-color="purple"]::before { background: linear-gradient(90deg, var(--purple), #c9a8ff); }
.module-card[data-color="pink"]::before { background: linear-gradient(90deg, var(--pink), #f9a8d4); }
.module-card[data-color="cyan"]::before { background: linear-gradient(90deg, var(--cyan), #67e8f9); }

.module-top {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.module-icon {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
}
.module-icon.sun { background: var(--sun-glow); }
.module-icon.blue { background: var(--accent-glow); }
.module-icon.green { background: var(--green-glow); }
.module-icon.purple { background: var(--purple-glow); }
.module-icon.pink { background: var(--pink-glow); }
.module-icon.cyan { background: var(--cyan-glow); }

.module-badge {
  padding: 4px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.badge-live { background: rgba(46,204,113,0.15); color: var(--green); }
.badge-dev { background: rgba(244,162,0,0.15); color: var(--sun); }
.badge-local { background: rgba(164,123,252,0.15); color: var(--purple); }
.badge-tool { background: rgba(34,211,238,0.15); color: var(--cyan); }

.module-name {
  font-size: 18px; font-weight: 700; line-height: 1.3;
}
.module-desc {
  font-size: 13px; color: var(--text-2); line-height: 1.6;
  flex: 1;
}

.module-tech {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.tech-tag {
  padding: 3px 8px; border-radius: var(--radius-xs);
  font-size: 11px; font-weight: 500;
  background: var(--surface-3); color: var(--text-2);
}

.module-links {
  display: flex; gap: 8px; flex-wrap: wrap;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.module-link {
  padding: 7px 14px; border-radius: var(--radius-xs);
  font-size: 12px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
  transition: var(--transition);
}
.module-link.primary {
  background: var(--accent); color: #fff;
}
.module-link.primary:hover { background: #3d7be5; }
.module-link.secondary {
  background: var(--surface-3); color: var(--text);
}
.module-link.secondary:hover { background: var(--surface-hover); }

/* ── Quick Actions ───────────────────────────────── */
.quick-actions {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 36px;
}
.quick-action {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 14px;
  text-align: center;
  transition: var(--transition);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.quick-action:hover {
  border-color: var(--accent);
  background: var(--surface-hover);
  transform: translateY(-2px);
}
.quick-action .qa-icon { font-size: 28px; }
.quick-action .qa-label { font-size: 12px; font-weight: 600; color: var(--text-2); }

/* ── Footer ──────────────────────────────────────── */
.footer {
  text-align: center; padding: 24px;
  font-size: 12px; color: var(--text-3);
  border-top: 1px solid var(--border);
}
.footer-ver { opacity: 0.5; }

/* ── Responsive ──────────────────────────────────── */
@media (max-width: 768px) {
  .header-inner { height: 56px; }
  .header-subtitle { display: none; }
  .search-wrap { flex: 1; min-width: 0; }
  .header-clock { display: none; }
  .main { padding: 20px 14px 40px; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stat-card { padding: 12px; gap: 10px; }
  .stat-icon { width: 36px; height: 36px; font-size: 16px; }
  .stat-value { font-size: 20px; }
  .modules-grid { grid-template-columns: 1fr; gap: 12px; }
  .module-card { padding: 18px; }
  .quick-actions { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .quick-action { padding: 12px 8px; }
  .category-bar { gap: 6px; }
  .cat-btn { padding: 6px 14px; font-size: 12px; }
}
@media (max-width: 480px) {
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .quick-actions { grid-template-columns: repeat(2, 1fr); }
}

/* ── Animations ──────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.module-card, .stat-card, .quick-action {
  animation: fadeUp 0.5s ease both;
}
.module-card:nth-child(1) { animation-delay: 0.03s; }
.module-card:nth-child(2) { animation-delay: 0.06s; }
.module-card:nth-child(3) { animation-delay: 0.09s; }
.module-card:nth-child(4) { animation-delay: 0.12s; }
.module-card:nth-child(5) { animation-delay: 0.15s; }
.module-card:nth-child(6) { animation-delay: 0.18s; }
.module-card:nth-child(7) { animation-delay: 0.21s; }
.module-card:nth-child(8) { animation-delay: 0.24s; }
.module-card:nth-child(9) { animation-delay: 0.27s; }
.module-card:nth-child(10) { animation-delay: 0.3s; }

/* ── No Results ──────────────────────────────────── */
.no-results {
  text-align: center; padding: 48px 24px;
  color: var(--text-3); font-size: 15px;
  display: none;
}
.no-results.visible { display: block; }
.no-results .nr-icon { font-size: 48px; margin-bottom: 12px; }

/* ── Hidden ──────────────────────────────────────── */
.hidden { display: none !important; }

/* ── Scroll indicator ────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
</style>
</head>

// ══════════════════════════════════════════════════════════════════════════
// Render Engine
// ══════════════════════════════════════════════════════════════════════════

const container = document.getElementById('modulesContainer');
const searchInput = document.getElementById('searchInput');
const noResults = document.getElementById('noResults');
let activeCategory = 'all';

function badgeLabel(badge) {
  const map = { live: 'LIVE', dev: 'DEV', local: 'LOCAL', tool: 'TOOL' };
  return map[badge] || badge;
}

function renderCard(mod) {
  const linksHtml = mod.links.map(l => {
    if (l.local) {
      return `<span class="module-link secondary" title="${l.cmd || ''}">&#128187; ${l.label}</span>`;
    }
    return `<a class="module-link ${l.type}" href="${l.url}" target="_blank" onclick="event.stopPropagation()">${l.label} ${l.type === 'primary' ? '&#8592;' : ''}</a>`;
  }).join('');

  const techHtml = mod.tech.map(t => `<span class="tech-tag">${t}</span>`).join('');

  return `
    <div class="module-card" data-color="${mod.color}" data-cat="${mod.category}" data-id="${mod.id}" data-search="${mod.name} ${mod.subtitle} ${mod.desc} ${mod.tech.join(' ')}">
      <div class="module-top">
        <div class="module-icon ${mod.color}">${mod.icon}</div>
        <span class="module-badge badge-${mod.badge}">${badgeLabel(mod.badge)}</span>
      </div>
      <div class="module-name">${mod.name}</div>
      <div class="module-desc">${mod.desc}</div>
      <div class="module-tech">${techHtml}</div>
      <div class="module-links">${linksHtml}</div>
    </div>
  `;
}

function groupByCategory(modules) {
  const groups = {
    core: { title: 'מערכת ליבה — SEMO OS', modules: [] },
    dashboard: { title: 'דשבורדים', modules: [] },
    tool: { title: 'כלים ואוטומציה', modules: [] },
    integration: { title: 'אינטגרציות', modules: [] },
  };
  modules.forEach(m => {
    if (groups[m.category]) groups[m.category].modules.push(m);
  });
  return groups;
}

function render() {
  const query = searchInput.value.trim().toLowerCase();
  let filtered = MODULES;

  if (query) {
    filtered = MODULES.filter(m => {
      const hay = `${m.name} ${m.subtitle} ${m.desc} ${m.tech.join(' ')} ${m.category}`.toLowerCase();
      return hay.includes(query);
    });
  }

  if (activeCategory !== 'all') {
    filtered = filtered.filter(m => m.category === activeCategory);
  }

  if (filtered.length === 0) {
    container.innerHTML = '';
    noResults.classList.add('visible');
    return;
  }

  noResults.classList.remove('visible');

  if (activeCategory !== 'all' || query) {
    container.innerHTML = `
      <div class="section">
        <div class="modules-grid">${filtered.map(renderCard).join('')}</div>
      </div>
    `;
  } else {
    const groups = groupByCategory(filtered);
    container.innerHTML = Object.values(groups)
      .filter(g => g.modules.length > 0)
      .map(g => `
        <div class="section">
          <div class="section-title">${g.title}</div>
          <div class="modules-grid">${g.modules.map(renderCard).join('')}</div>
        </div>
      `).join('');
  }

  // Update stats
  document.getElementById('statModules').textContent = MODULES.length;
  document.getElementById('statDashboards').textContent = MODULES.filter(m => m.category === 'dashboard').length;
}

// ── Category Filter ─────────────────────────────────
document.getElementById('categoryBar').addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeCategory = btn.dataset.cat;
  render();
});

// ── Search ──────────────────────────────────────────
searchInput.addEventListener('input', () => render());

// ── Card click → primary link ───────────────────────
container.addEventListener('click', e => {
  const card = e.target.closest('.module-card');
  if (!card || e.target.closest('.module-link')) return;
  const mod = MODULES.find(m => m.id === card.dataset.id);
  if (!mod) return;
  const primary = mod.links.find(l => l.type === 'primary');
  if (primary && primary.url !== '#') window.open(primary.url, '_blank');
});

// ── Clock ───────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const opts = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
  document.getElementById('clock').textContent = now.toLocaleTimeString('he-IL', opts);
}
setInterval(updateClock, 1000);
updateClock();

// ── Last Update ─────────────────────────────────────
document.getElementById('lastUpdate').textContent = new Date().toLocaleDateString('he-IL');

// ── Init ────────────────────────────────────────────
render();

// ── Keyboard shortcut: Ctrl+K → Search ──────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
  }
  if (e.key === 'Escape') searchInput.blur();
});

// ── Auto-Discovery: detect new HTML files not in registry ──
(async function checkForNewModules() {
  try {
    const res = await fetch('https://api.github.com/repos/nadavsemo-a11y/solar-quotes/contents/?ref=main');
    if (!res.ok) return;
    const files = await res.json();
    const htmlFiles = files
      .filter(f => f.name.endsWith('.html'))
      .map(f => f.name)
      .filter(f => f !== 'portal.html' && f !== 'solar-quote-template.html');

    // Collect all URLs referenced in MODULES
    const knownFiles = new Set();
    MODULES.forEach(m => {
      m.links.forEach(l => {
        const match = l.url.match(/solar-quotes\/([^/]+\.html)/);
        if (match) knownFiles.add(match[1]);
      });
    });
    // Also add known external dashboard files
    knownFiles.add('solar-quote-full.html');

    const newFiles = htmlFiles.filter(f => !knownFiles.has(f));

    if (newFiles.length > 0) {
      const banner = document.createElement('div');
      banner.style.cssText = 'background:rgba(244,162,0,0.1);border:1px solid rgba(244,162,0,0.3);border-radius:10px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;';
      banner.innerHTML = '<span style="font-size:20px">&#9888;</span><span style="font-weight:600;color:var(--sun)">זוהו מודולים חדשים שלא רשומים בפורטל:</span>' +
        newFiles.map(f => `<a href="https://nadavsemo-a11y.github.io/solar-quotes/${f}" target="_blank" style="background:var(--surface-3);padding:4px 10px;border-radius:6px;font-size:12px;color:var(--text)">${f}</a>`).join('');
      document.querySelector('.main').insertBefore(banner, document.querySelector('.stats-bar'));
    }
  } catch(e) { /* silent fail */ }
})();
</script>
