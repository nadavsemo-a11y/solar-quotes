<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEMO AGS — פורטל ספק</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --sun: #F4A200; --sun-light: #FFD166;
  --sky: #0A1628; --sky-mid: #112240; --sky-light: #1D3461;
  --green: #2ECC71; --green-dark: #1a9e52; --red: #e74c3c;
  --text: #1a1a2e; --gray: #6B7280; --gray-light: #9CA3AF;
  --light: #F7F9FC; --white: #ffffff; --border: #E2E8F0;
  --radius: 16px; --radius-sm: 10px;
  --shadow: 0 2px 20px rgba(0,0,0,0.07);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Assistant', 'Heebo', sans-serif; background: var(--light); color: var(--text); min-height: 100vh; }
button { font-family: inherit; cursor: pointer; border: none; }

/* ── Header ── */
.header {
  background: linear-gradient(135deg, var(--sky) 0%, var(--sky-mid) 60%, var(--sky-light) 100%);
  padding: 20px 28px; display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}
.logo { display: flex; align-items: center; gap: 14px; color: white; }
.logo img { height: 38px; filter: brightness(0) invert(1); }
.logo-title { font-size: 13px; font-weight: 600; opacity: 0.7; }
.logo-name { font-size: 20px; font-weight: 900; color: var(--sun); }
.header-badge {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  color: white; padding: 6px 16px; border-radius: 50px; font-size: 13px; font-weight: 600;
}

/* ── Main ── */
.main { max-width: 900px; margin: 0 auto; padding: 28px 20px; }
.page-title { text-align: center; margin-bottom: 28px; }
.page-title h1 { font-size: 26px; font-weight: 900; color: var(--sky); }
.page-title h1 span { color: var(--sun); }
.page-title p { font-size: 14px; color: var(--gray); margin-top: 4px; }

/* ── Table ── */
.table-card {
  background: var(--white); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
}
.table-card-header {
  background: linear-gradient(135deg, var(--sky), var(--sky-mid));
  padding: 14px 24px; color: white; font-size: 15px; font-weight: 700;
  display: flex; align-items: center; gap: 10px;
}
.table-card-header .icon {
  width: 28px; height: 28px; background: rgba(255,255,255,0.15); border-radius: 7px;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 12px 16px; font-size: 12px; font-weight: 700; color: var(--sky-mid);
  text-transform: uppercase; letter-spacing: 0.5px; text-align: right;
  border-bottom: 2px solid var(--border); background: var(--light);
}
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(244,162,0,0.03); }
tbody td { padding: 14px 16px; font-size: 14px; vertical-align: middle; }
tbody tr.highlight-row { animation: rowHighlight 5s ease-out; }
@keyframes rowHighlight {
  0% { background: rgba(244,162,0,0.25); }
  70% { background: rgba(244,162,0,0.12); }
  100% { background: transparent; }
}

.td-project { font-weight: 700; }
.td-task { color: var(--gray); font-size: 13px; }
.td-address { font-size: 13px; color: var(--gray); }
.td-phone a { color: var(--sky-mid); text-decoration: none; font-size: 13px; }
.td-phone a:hover { text-decoration: underline; }
.td-date input {
  padding: 5px 8px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--light); color: var(--text); font-family: inherit;
  font-size: 13px; direction: ltr; width: 130px;
}
.td-date input:focus { outline: none; border-color: var(--sun); }

/* ── File ── */
.file-btn {
  padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
  transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px;
}
.file-btn.upload {
  background: var(--light); border: 1px solid var(--border); color: var(--gray);
}
.file-btn.upload:hover { border-color: var(--sun); color: var(--sun); }
.file-btn.done { background: rgba(46,204,113,0.1); color: var(--green-dark); border: 1px solid rgba(46,204,113,0.3); cursor: default; }
.file-btn.uploading { background: var(--light); color: var(--sky-mid); border: 1px solid var(--border); cursor: wait; }
input[type="file"] { display: none; }

/* ── Action Buttons ── */
.btn-done-sm {
  padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 700;
  transition: all 0.2s;
}
.btn-done-sm.ready {
  background: linear-gradient(135deg, var(--green), var(--green-dark));
  color: #fff; box-shadow: 0 2px 8px rgba(46,204,113,0.3);
}
.btn-done-sm.ready:hover { box-shadow: 0 4px 16px rgba(46,204,113,0.5); }
.btn-done-sm.disabled {
  background: var(--light); color: var(--gray-light); border: 1px solid var(--border); cursor: not-allowed;
}
.btn-doc {
  padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
  background: rgba(79,142,247,0.1); color: #4f8ef7; border: 1px solid rgba(79,142,247,0.3);
  text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
}
.btn-doc:hover { background: rgba(79,142,247,0.2); }

/* ── Undo Bar ── */
.undo-bar {
  display: inline-flex; align-items: center; gap: 10px; padding: 6px 14px;
  border-radius: 8px; background: var(--sky); color: white; font-size: 13px; font-weight: 600;
  animation: fadeIn 0.2s;
}
.undo-countdown { color: var(--sun); font-weight: 800; font-size: 16px; direction: ltr; }
.undo-cancel {
  background: rgba(255,255,255,0.15); color: white; border: none;
  padding: 3px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ── States ── */
.completing { opacity: 0.4; }
.done-exit { opacity: 0; height: 0; overflow: hidden; transition: all 0.4s; }

.empty-state { text-align: center; padding: 60px 20px; }
.empty-icon { font-size: 64px; margin-bottom: 16px; }
.empty-title { font-size: 22px; font-weight: 900; color: var(--sky); margin-bottom: 8px; }
.empty-text { font-size: 15px; color: var(--gray); }

.loading { text-align: center; padding: 60px 20px; }
.spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--sun); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  padding: 12px 24px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700;
  z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,0.15); transition: all 0.3s;
  opacity: 0; pointer-events: none;
}
.toast.visible { opacity: 1; }
.toast.success { background: var(--green); color: #fff; }
.toast.error { background: var(--red); color: #fff; }

.footer { text-align: center; padding: 20px; font-size: 12px; color: var(--gray-light); }

@media (max-width: 700px) {
  table, thead, tbody, th, td, tr { display: block; }
  thead { display: none; }
  tbody tr { border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; padding: 14px; background: var(--white); }
  tbody td { padding: 4px 0; border: none; display: flex; justify-content: space-between; align-items: center; }
  tbody td::before { content: attr(data-label); font-size: 11px; font-weight: 700; color: var(--sky-mid); text-transform: uppercase; }
  .td-actions { justify-content: flex-end; gap: 8px; margin-top: 8px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <img src="ags-logo.png" alt="SEMO AGS">
    <div>
      <div class="logo-title">פורטל ספק</div>
      <div class="logo-name" id="vendorName">—</div>
    </div>
  </div>
  <div class="header-badge" id="taskCount">—</div>
</header>

<div class="main">
  <div class="page-title">
    <h1>הזמנות <span>פתוחות</span></h1>
    <p id="subtitle">טוען...</p>
  </div>
  <div id="content">
    <div class="loading"><div class="spinner"></div><div style="color:var(--gray)">טוען...</div></div>
  </div>
</div>

<div class="footer">SEMO A.G.S — Solar Operations System</div>
<div class="toast" id="toast"></div>

<script>
const V = window.__VENDOR__ || {};
const API = V.apiBase || '';
const TOKEN = V.token || '';
const IS_DEMO = new URLSearchParams(window.location.search).get('demo') === 'true';
const HIGHLIGHT_REF = new URLSearchParams(window.location.search).get('highlight') || '';

let tasks = [];
const uploadedFiles = {};
const fieldValues = {};

document.getElementById('vendorName').textContent = V.supplierName || '';
loadTasks();

async function loadTasks() {
  try {
    const demoParam = IS_DEMO ? '&demo=true' : '';
    const res = await fetch(`${API}/v/api/tasks?token=${TOKEN}${demoParam}`);
    const data = await res.json();
    if (!data.success) { showError(data.error || 'שגיאה'); return; }

    document.getElementById('vendorName').textContent = data.supplierName || V.supplierName || '';
    tasks = data.tasks || [];
    document.getElementById('taskCount').textContent = tasks.length > 0 ? `${tasks.length} הזמנות` : 'אין הזמנות';
    document.getElementById('subtitle').textContent = tasks.length > 0 ? `${tasks.length} הזמנות ממתינות לטיפול` : '';
    render();

    if (HIGHLIGHT_REF) {
      setTimeout(() => {
        const row = document.getElementById(`row-${HIGHLIGHT_REF}`);
        if (row) { row.classList.add('highlight-row'); row.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
      }, 300);
    }
  } catch (e) { showError('שגיאת חיבור: ' + e.message); }
}

function render() {
  const el = document.getElementById('content');
  if (tasks.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">&#9728;&#65039;</div><div class="empty-title">אין הזמנות פתוחות</div><div class="empty-text">כל הכבוד! אין כרגע הזמנות שדורשות טיפול.</div></div>`;
    return;
  }

  const needsFile = tasks.some(t => t.taskRules?.requireFile);
  const hasWorkOrder = tasks.some(t => t.workOrderUrl);

  let cols = `<th>פרויקט</th><th>משימה</th><th>כתובת</th><th>טלפון</th><th>תאריך מתוכנן</th>`;
  if (needsFile) cols += `<th>קובץ</th>`;
  if (hasWorkOrder) cols += `<th>הזמנת עבודה</th>`;
  cols += `<th>פעולה</th>`;

  const rows = tasks.map(t => {
    if (t.hasFile) uploadedFiles[t.ref] = { name: 'קיים', uploaded: true };
    const dateVal = t.plannedDate ? t.plannedDate.split(' ')[0] : '';
    const rules = t.taskRules || {};

    let fileTd = '';
    if (needsFile) {
      if (!rules.requireFile) {
        fileTd = `<td data-label="קובץ">—</td>`;
      } else if (t.hasFile) {
        fileTd = `<td data-label="קובץ"><span class="file-btn done">&#10003; צורף</span></td>`;
      } else {
        fileTd = `<td data-label="קובץ" id="file-cell-${t.ref}">
          <button class="file-btn upload" onclick="document.getElementById('file-${t.ref}').click()">${esc(rules.fileLabel || '&#128206; צרף')}</button>
          <input type="file" id="file-${t.ref}" accept="image/*,.pdf,.doc,.docx" capture="environment" onchange="onFileSelect('${t.ref}', this)">
        </td>`;
      }
    }

    let woTd = '';
    if (hasWorkOrder) {
      woTd = t.workOrderUrl
        ? `<td data-label="הזמנת עבודה"><a class="btn-doc" href="${esc(t.workOrderUrl)}" target="_blank">&#128196; צפה</a></td>`
        : `<td data-label="הזמנת עבודה">—</td>`;
    }

    return `<tr id="row-${t.ref}">
      <td data-label="פרויקט" class="td-project">${esc(t.projectName)}</td>
      <td data-label="משימה" class="td-task">${esc(t.taskName)}</td>
      <td data-label="כתובת" class="td-address">${esc(t.address || '—')}</td>
      <td data-label="טלפון" class="td-phone">${t.phone ? `<a href="tel:${esc(t.phone)}">${esc(t.phone)}</a>` : '—'}</td>
      <td data-label="תאריך" class="td-date"><input type="date" value="${dateVal}" onchange="updateDate('${t.ref}', this.value)"></td>
      ${fileTd}
      ${woTd}
      <td data-label="פעולה" class="td-actions" id="action-${t.ref}">
        <button class="btn-done-sm ${canComplete(t) ? 'ready' : 'disabled'}" id="btn-${t.ref}"
          onclick="handleDone('${t.ref}')" ${canComplete(t) ? '' : 'disabled'}>&#10003; בוצע</button>
      </td>
    </tr>`;
  }).join('');

  el.innerHTML = `<div class="table-card">
    <div class="table-card-header"><div class="icon">&#9889;</div> הזמנות פתוחות</div>
    <table><thead><tr>${cols}</tr></thead><tbody>${rows}</tbody></table>
  </div>`;
}

// ── File ──
async function onFileSelect(ref, input) {
  const file = input.files[0]; if (!file) return;
  const cell = document.getElementById(`file-cell-${ref}`);
  cell.innerHTML = `<span class="file-btn uploading">מעלה...</span>`;

  if (IS_DEMO) {
    uploadedFiles[ref] = { name: file.name, uploaded: true };
    cell.innerHTML = `<span class="file-btn done">&#10003; ${esc(file.name)}</span>`;
    showToast('קובץ הועלה (דמו)', 'success'); updateDoneButton(ref); return;
  }
  try {
    const fd = new FormData(); fd.append('file', file);
    const res = await fetch(`${API}/v/api/upload?token=${TOKEN}&ref=${ref}`, { method: 'POST', body: fd });
    const data = await res.json();
    if (data.success) {
      uploadedFiles[ref] = { name: file.name, uploaded: true };
      cell.innerHTML = `<span class="file-btn done">&#10003; ${esc(file.name)}</span>`;
      showToast('קובץ הועלה', 'success');
    } else throw new Error(data.error);
  } catch (e) {
    cell.innerHTML = `<span class="file-btn upload" style="color:var(--red)">שגיאה — נסה שוב</span>`;
    showToast('שגיאה: ' + e.message, 'error');
  }
  updateDoneButton(ref);
}

// ── Validation ──
function canComplete(task) {
  const r = task.taskRules || {};
  if (r.requireFile && !uploadedFiles[task.ref]?.uploaded) return false;
  for (const f of (r.fields || [])) { if (f.required && !(fieldValues[task.ref] || {})[f.id]?.trim()) return false; }
  return true;
}
function updateDoneButton(ref) {
  const t = tasks.find(x => x.ref === ref); if (!t) return;
  const btn = document.getElementById(`btn-${ref}`); if (!btn) return;
  const ok = canComplete(t);
  btn.className = `btn-done-sm ${ok ? 'ready' : 'disabled'}`; btn.disabled = !ok;
}

// ── Done with Undo ──
function handleDone(ref) {
  const t = tasks.find(x => x.ref === ref);
  if (!t || !canComplete(t)) return;
  const row = document.getElementById(`row-${ref}`);
  const cell = document.getElementById(`action-${ref}`);
  let cancelled = false, countdown = 5;
  row.classList.add('completing');

  cell.innerHTML = `<div class="undo-bar">
    <button class="undo-cancel" id="undo-${ref}">&#8617; ביטול</button>
    <span class="undo-countdown" id="cd-${ref}">${countdown}</span>
  </div>`;

  const iv = setInterval(() => { countdown--; const c = document.getElementById(`cd-${ref}`); if (c) c.textContent = countdown; if (countdown <= 0) clearInterval(iv); }, 1000);
  const to = setTimeout(async () => { clearInterval(iv); if (!cancelled) await executeDone(ref, t); }, 5000);

  document.getElementById(`undo-${ref}`).onclick = () => {
    cancelled = true; clearTimeout(to); clearInterval(iv);
    row.classList.remove('completing');
    cell.innerHTML = `<button class="btn-done-sm ${canComplete(t)?'ready':'disabled'}" id="btn-${ref}" onclick="handleDone('${ref}')" ${canComplete(t)?'':'disabled'}>&#10003; בוצע</button>`;
    showToast('בוטל', 'success');
  };
}

async function executeDone(ref, t) {
  if (IS_DEMO) {
    document.getElementById(`row-${ref}`).classList.add('done-exit');
    showToast(`[דמו] ${t.projectName} — בוצע ✓`, 'success');
    setTimeout(() => { tasks = tasks.filter(x => x.ref !== ref); updateCounts(); if (!tasks.length) render(); else document.getElementById(`row-${ref}`)?.remove(); }, 400);
    return;
  }
  try {
    const res = await fetch(`${API}/v/api/done`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: TOKEN, taskRef: ref, fields: {}, note: '' }) });
    const data = await res.json();
    if (data.success) {
      document.getElementById(`row-${ref}`).classList.add('done-exit');
      showToast(`${t.projectName} — בוצע ✓`, 'success');
      setTimeout(() => { tasks = tasks.filter(x => x.ref !== ref); updateCounts(); if (!tasks.length) render(); else document.getElementById(`row-${ref}`)?.remove(); }, 400);
    } else throw new Error(data.error);
  } catch (e) {
    const row = document.getElementById(`row-${ref}`); row.classList.remove('completing');
    const cell = document.getElementById(`action-${ref}`);
    cell.innerHTML = `<button class="btn-done-sm ready" id="btn-${ref}" onclick="handleDone('${ref}')">&#10003; בוצע</button>`;
    showToast('שגיאה: ' + e.message, 'error');
  }
}

function updateCounts() {
  document.getElementById('taskCount').textContent = tasks.length > 0 ? `${tasks.length} הזמנות` : 'אין הזמנות';
  document.getElementById('subtitle').textContent = tasks.length > 0 ? `${tasks.length} הזמנות ממתינות לטיפול` : '';
}

async function updateDate(ref, date) {
  if (IS_DEMO) { showToast('[דמו] תאריך עודכן', 'success'); return; }
  try {
    const res = await fetch(`${API}/v/api/date`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: TOKEN, taskRef: ref, date }) });
    const data = await res.json();
    showToast(data.success ? 'תאריך עודכן' : 'שגיאה: ' + data.error, data.success ? 'success' : 'error');
  } catch (e) { showToast('שגיאה: ' + e.message, 'error'); }
}

function showError(msg) { document.getElementById('content').innerHTML = `<div class="empty-state"><div class="empty-icon">&#9888;&#65039;</div><div class="empty-title">שגיאה</div><div class="empty-text">${esc(msg)}</div></div>`; }
function esc(s) { const el = document.createElement('span'); el.textContent = s || ''; return el.innerHTML; }
function showToast(msg, type='success') { const el = document.getElementById('toast'); el.textContent = msg; el.className = `toast ${type} visible`; clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('visible'), 3000); }
</script>
</body>
</html>
